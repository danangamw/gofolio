name: CI/CD Go Monolith Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # ── 1 & 2. Quality Assurance (Lint & Test) ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Unit Tests
        run: go test ./... -count=1

  # ── 3. Build & Push Container Image to GHCR ────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub, no manual secret setup required

      - name: Extract metadata (Tags, Labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy via SSH to VPS ────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            cd /opt/go-cms
            
            # Convert repository name to lowercase dynamically for GHCR compatibility
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Determine the target image tag based on the trigger event type (Git Tag or Commit SHA)
            if [ "${{ github.ref_type }}" = "tag" ]; then
              export BACKEND_IMAGE=ghcr.io/${REPO_LOWER}:${{ github.ref_name }}
            else
              export BACKEND_IMAGE=ghcr.io/${REPO_LOWER}:sha-${{ github.sha }}
            fi
            
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f