{{ define "base" }}
<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    {{ if .Description }}<meta name="description" content="{{ .Description }}">{{ end }}
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/img/favicon.ico">
    <script>
        const t = localStorage.getItem('theme');
        const s = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && s)) document.documentElement.classList.add('dark');
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="/" class="nav-logo">danang.dev</a>
            <div class="nav-right">
                <ul class="nav-links" id="navLinks">
                    <li><a href="/" class="nav-link {{ if eq .ActiveMenu "home" }}active{{ end }}">Home</a></li>
                    <li><a href="/blog" class="nav-link {{ if eq .ActiveMenu "blog" }}active{{ end }}">Blog</a></li>
                    <li><a href="/portfolio" class="nav-link {{ if eq .ActiveMenu "portfolio" }}active{{ end }}">Portfolio</a></li>
                    <li><a href="/about" class="nav-link {{ if eq .ActiveMenu "about" }}active{{ end }}">About</a></li>
                </ul>
                <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
                    <svg class="moon-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg class="sun-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                </button>
                <button class="nav-burger" id="burgerToggle" aria-label="Toggle Navigation">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>
    <main style="margin-top:5.5rem;min-height:calc(100vh - 12rem);">
        {{ template "content" . }}
    </main>
    <footer style="padding:2.5rem 0;border-top:1px solid var(--border);text-align:center;color:var(--muted-foreground);font-size:0.875rem;">
        <div class="container"><p>&copy; 2026 Danang. Built with Go.</p></div>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
{{ end }}
