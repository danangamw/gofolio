{{ define "admin_base" }}
<!DOCTYPE html>
<html lang="id" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} — Admin</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        const t = localStorage.getItem('theme');
        const s = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && s)) document.documentElement.classList.add('dark');
    </script>
</head>
<body>
    <header style="position:fixed;top:0;left:0;right:0;height:4rem;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;z-index:100;">
        <span style="font-weight:800;font-size:1.1rem;">CMS Admin</span>
        <nav style="margin-left:2rem;display:flex;gap:1.5rem;">
            <a href="/admin" class="nav-link">Dashboard</a>
            <a href="/admin/blogs" class="nav-link">Blog</a>
            <a href="/admin/portfolios" class="nav-link">Portfolio</a>
        </nav>
        <form action="/admin/logout" method="POST" style="margin-left:auto;">
            <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
            <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
        </form>
    </header>
    <main style="margin-top:5rem;padding:2rem;">
        {{ template "content" . }}
    </main>
    <script src="/static/js/admin.js"></script>
</body>
</html>
{{ end }}
