{{ define "content" }}
<div class="login-container">
    <div class="login-form-wrapper">
        <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:1.5rem;text-align:center;">Login</h1>
        {{ if .Error }}<p style="color:var(--destructive);margin-bottom:1rem;text-align:center;">{{ .Error }}</p>{{ end }}
        <form action="/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password" required>
            </div>
            <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" type="submit">Sign In</button>
        </form>
    </div>
</div>
{{ end }}
