{{ define "content" }}
<div class="container" style="padding-bottom: 5rem;">
    <!-- Page Header -->
    <header class="page-header">
        <h1 class="page-title">Blog</h1>
        <p class="page-subtitle">
            Articles, tutorials, and technical notes on software engineering and systems architecture.
        </p>
    </header>

    <!-- Grid Layout -->
    <div class="grid-3">
        {{ range .Blogs }}
        <div class="card">
            <div class="card-header">
                <div class="blog-meta-container">
                    <span class="badge blog-category-badge">{{ .Category }}</span>
                    <time class="blog-date-text">{{ .Date }}</time>
                </div>
                <h3 class="card-title" style="font-size: 1.25rem;">
                    <a href="/blog/{{ .Slug }}" class="blog-title-link">{{ .Title }}</a>
                </h3>
                <p class="card-description blog-excerpt-text">{{ .Excerpt }}</p>
            </div>
            <div class="card-content"></div>
            <div class="card-footer" style="margin-top: auto;">
                <a href="/blog/{{ .Slug }}" class="btn btn-ghost btn-sm blog-read-more-btn">
                    Read More
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 0.2rem;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </a>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
