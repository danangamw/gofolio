{{ define "content" }}
<div class="container" style="padding-bottom: 5rem;">
    <!-- Page Header -->
    <header style="padding: 4rem 0 3rem; max-width: 700px;">
        <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 1rem;">Blog</h1>
        <p style="font-size: 1.125rem; color: var(--muted-foreground); line-height: 1.6;">
            Articles, tutorials, and technical notes on software engineering and systems architecture.
        </p>
    </header>

    <!-- Grid Layout -->
    <div class="grid-3">
        {{ range .Blogs }}
        <div class="card">
            <div class="card-header">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                    <span class="badge" style="background-color: color-mix(in oklch, var(--primary) 8%, transparent); color: var(--primary); border: none;">{{ .Category }}</span>
                    <time style="font-size: 0.8rem; color: var(--muted-foreground);">{{ .Date }}</time>
                </div>
                <h3 class="card-title" style="font-size: 1.25rem;">
                    <a href="/blog/{{ .Slug }}" style="color: inherit; text-decoration: none;">{{ .Title }}</a>
                </h3>
                <p class="card-description" style="-webkit-line-clamp: 3; margin-top: 0.5rem;">{{ .Excerpt }}</p>
            </div>
            <div class="card-content"></div>
            <div class="card-footer" style="margin-top: auto;">
                <a href="/blog/{{ .Slug }}" class="btn btn-ghost btn-sm" style="padding-left: 0; color: var(--primary); font-weight: 600;">
                    Read More
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 0.2rem;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </a>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
