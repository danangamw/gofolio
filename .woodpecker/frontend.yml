# ─── Pipeline: healthcare-frontend ───────────────────────────────────────────
# Triggered only when files inside healthcare-frontend/ change on branch main,
# or when a semver tag (e.g. v1.2.3) is pushed.

when:
  - event: push
    branch: main
    path:
      include:
        - healthcare-frontend/**
  - event: tag
    ref: refs/tags/v*

steps:
  # ── 1. Type-check & Build ──────────────────────────────────────────────────
  - name: build
    image: node:22-alpine
    directory: healthcare-frontend
    commands:
      - npm ci --ignore-scripts
      - npm run build

  # ── 2. Build & Push Docker image to GHCR ───────────────────────────────────
  - name: docker-build-push
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: [push, tag]
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-frontend
      dockerfile: healthcare-frontend/Dockerfile
      context: healthcare-frontend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password

  # ── 3. Deploy via SSH ──────────────────────────────────────────────────────
  - name: deploy
    image: appleboy/drone-ssh
    when:
      - event: [push, tag]
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_ssh_key
      port: 22
      script:
        - cd /opt/care/healthcare-frontend
        - docker pull ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-frontend:latest
        - docker compose -f docker-compose.prod.yml up -d --force-recreate
        - docker image prune -f
