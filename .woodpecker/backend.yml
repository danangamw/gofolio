# ─── Pipeline: go-cms ────────────────────────────────────────────
# Triggered on pushes to main and semver tags (e.g. v1.2.3).

when:
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*

steps:
  # ── 1. Lint & Vet ──────────────────────────────────────────────────────────
  - name: lint
    image: golang:1.26-alpine
    commands:
      - go vet ./...

  # ── 2. Unit Tests ──────────────────────────────────────────────────────────
  - name: test
    image: golang:1.26-alpine
    commands:
      - go test ./... -count=1

  # ── 3. Build & Push Docker image to GHCR ───────────────────────────────────
  - name: docker-build-push-main
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
        branch: main
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}
      dockerfile: Dockerfile
      context: .
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password

  - name: docker-build-push-tag
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: tag
        ref: refs/tags/v*
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}
      dockerfile: Dockerfile
      context: .
      tags:
        - latest
        - ${CI_COMMIT_TAG}
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password

  # ── 4. Deploy via SSH ──────────────────────────────────────────────────────
  - name: deploy
    image: appleboy/drone-ssh
    when:
      - event: [push, tag]
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_ssh_key
      port: 22
      script:
        - cd /opt/care/go-cms
        - export BACKEND_IMAGE=ghcr.io/${CI_REPO_OWNER,,}/${CI_REPO_NAME,,}:latest
        - docker compose -f docker-compose.prod.yml pull app
        - docker compose -f docker-compose.prod.yml up -d --force-recreate
        - docker image prune -f
